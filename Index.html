<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Web Messenger</title>
    
    <style>
        /* --- GLOBAL & APP LAYOUT --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #fafafa; color: #262626; display: flex; justify-content: center; height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: #fff; border-left: 1px solid #dbdbdb; border-right: 1px solid #dbdbdb; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        
        /* --- ROUTING (HIDES INACTIVE PAGES) --- */
        .screen { display: none !important; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex !important; }

        /* --- UI COMPONENTS --- */
        input { border: 1px solid #dbdbdb; border-radius: 4px; padding: 10px; font-size: 14px; background-color: #fafafa; outline: none; width: 100%; margin-bottom: 10px; }
        input:focus { border-color: #a8a8a8; }
        button { background-color: #0095f6; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        button:hover { background-color: #1877f2; }
        .icon-btn { background: none; color: black; font-size: 20px; padding: 0; width: auto; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background-color: #efefef; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #8e8e8e; position: relative; }
        
        /* Online Status Dot */
        .online-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; background-color: #4CAF50; border-radius: 50%; border: 2px solid white; display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #dbdbdb; font-size: 18px; font-weight: 700; height: 60px; min-height: 60px; }
        
        /* --- SCREENS --- */
        .center-screen { justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .logo { font-family: cursive; font-size: 40px; margin-bottom: 40px; }
        
        /* Inbox */
        .search-wrapper { padding: 10px 15px; border-bottom: 1px solid #dbdbdb; }
        .search-wrapper input { margin: 0; border-radius: 10px; background-color: #efefef; border: none; padding: 8px 15px; }
        .list-container { overflow-y: auto; flex: 1; }
        .user-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; }
        .user-item:hover { background-color: #fafafa; }
        .user-info { margin-left: 15px; display: flex; flex-direction: column; flex: 1; text-align: left; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-preview { font-size: 13px; color: #8e8e8e; margin-top: 2px; }
        
        /* Chat */
        .chat-header { justify-content: flex-start; gap: 15px; }
        .chat-title { display: flex; flex-direction: column; }
        .typing-status { font-size: 12px; color: #8e8e8e; font-weight: normal; display: none; }
        .message-thread { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .received { background-color: #efefef; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background-color: #0095f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .status-indicator { font-size: 11px; color: #8e8e8e; align-self: flex-end; margin-top: -6px; margin-bottom: 5px; }
        .chat-footer { padding: 15px 20px; border-top: 1px solid #dbdbdb; min-height: 70px; }
        .input-wrapper { display: flex; align-items: center; border: 1px solid #dbdbdb; border-radius: 24px; padding: 5px 15px; background: white; }
        .input-wrapper input { flex: 1; border: none; background: transparent; padding: 8px; font-size: 15px; margin: 0; }
        .send-btn { background: none; color: #0095f6; padding: 0; font-size: 14px; margin-left: 10px; width: auto; font-weight: 600;}
        
        #debug-log { margin-top: 15px; font-size: 12px; color: red; text-align: left; width: 100%; word-wrap: break-word; font-family: monospace; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="login-screen" class="screen center-screen active">
        <h1 class="logo">IG Messenger</h1>
        <div style="width: 100%; max-width: 300px;">
            <button id="btn-google-login" style="background-color: #fff; color: #262626; border: 1px solid #dbdbdb; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <svg viewBox="0 0 48 48" width="20px" height="20px">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Log in with Google
            </button>
            
            <p id="login-status" style="margin-top: 15px; font-size: 14px; font-weight: bold; color: #262626;">Waiting for login...</p>
            <div id="debug-log"></div>
        </div>
    </div>

    <div id="setup-screen" class="screen center-screen">
        <h2 style="margin-bottom: 10px;">Welcome!</h2>
        <p style="color: #8e8e8e; margin-bottom: 20px; font-size: 14px;">Create a username to start chatting.</p>
        <div style="width: 100%; max-width: 300px;">
            <input type="text" id="username-input" placeholder="Choose a username (lowercase)">
            <button id="btn-save-user">Create Account</button>
        </div>
    </div>

    <div id="inbox-screen" class="screen">
        <header class="header">
            <div id="my-username-display" style="font-weight: 700;">Inbox</div>
            <button class="icon-btn" id="btn-logout" style="font-size: 14px; font-weight: normal;">Log Out</button>
        </header>
        <div class="search-wrapper">
            <input type="text" id="inbox-search" placeholder="Search for new users to message...">
        </div>
        <div class="list-container" id="inbox-list"></div>
    </div>

    <div id="chat-screen" class="screen">
        <header class="header chat-header">
            <button class="icon-btn" onclick="navigateTo('inbox-screen')">⬅️</button>
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <div class="avatar" style="width: 32px; height: 32px; font-size: 14px;">
                    👤
                    <div class="online-dot" id="chat-online-dot"></div>
                </div>
                <div class="chat-title">
                    <span class="user-name" id="chat-partner-name">...</span>
                    <span class="typing-status" id="typing-indicator">typing...</span>
                </div>
            </div>
        </header>
        <div class="message-thread" id="message-thread"></div>
        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" placeholder="Message..." id="message-input" autocomplete="off">
                <button class="send-btn" id="btn-send">Send</button>
            </div>
        </footer>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // Using signInWithPopup to bypass page-reload data loss
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, query, where, onSnapshot, serverTimestamp, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🔴 === PASTE YOUR CONFIG HERE CAREFULLY === 🔴
    const firebaseConfig = {
  apiKey: "AIzaSyAzRniwIrtaNHhW4D3YK2zGySF_EnWv6iE",
  authDomain: "ig08-c8498.firebaseapp.com",
  projectId: "ig08-c8498",
  storageBucket: "ig08-c8498.firebasestorage.app",
  messagingSenderId: "864924156370",
  appId: "1:864924156370:web:816408ac2be18cb077480b"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let currentUserData = null;
    let currentChatPartnerId = null;
    let currentChatId = null;
    let unsubMessages = null, unsubTyping = null, unsubInbox = null, unsubPartner = null;

    // --- DEBUG LOGGER ---
    const statusTracker = document.getElementById('login-status');
    function logError(title, error) {
        console.error(title, error);
        document.getElementById('debug-log').innerHTML += `<b>${title}:</b><br>${error.message || error}<br><br>`;
    }

    // --- NAVIGATION ---
    window.navigateTo = (screenId) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        if(screenId === 'inbox-screen') {
            if(unsubMessages) unsubMessages();
            if(unsubTyping) unsubTyping();
            if(unsubPartner) unsubPartner();
            document.getElementById('inbox-search').value = ''; 
            loadInbox(); // Load actual private chats
        }
    };

    // --- GOOGLE LOGIN (POPUP METHOD) ---
    document.getElementById('btn-google-login').addEventListener('click', () => {
        statusTracker.innerText = "Opening Google window...";
        document.getElementById('debug-log').innerHTML = ""; 
        
        signInWithPopup(auth, googleProvider)
            .then((result) => {
                statusTracker.innerText = "Google Auth Success! Loading profile...";
            })
            .catch((error) => {
                statusTracker.innerText = "Login stopped or failed.";
                logError("Popup Error", error);
            });
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
        if(currentUser) await updateDoc(doc(db, "users", currentUser.uid), { isOnline: false });
        await signOut(auth);
    });

    // --- THE CORE AUTH LISTENER ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            statusTracker.innerText = `User detected (${user.email}). Checking Firestore...`;
            try {
                currentUser = user;
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (!userDoc.exists()) {
                    statusTracker.innerText = "No username found. Routing to Setup...";
                    navigateTo('setup-screen');
                } else {
                    statusTracker.innerText = "Username found! Loading Inbox...";
                    currentUserData = userDoc.data();
                    document.getElementById('my-username-display').innerText = currentUserData.username;
                    
                    // Mark as online
                    await updateDoc(userDocRef, { isOnline: true });
                    window.addEventListener('beforeunload', () => { updateDoc(userDocRef, { isOnline: false }); });
                    
                    navigateTo('inbox-screen');
                }
            } catch (error) {
                statusTracker.innerText = "Database Connection Failed.";
                logError("Firestore Error", error);
            }
        } else {
            currentUser = null;
            currentUserData = null;
            navigateTo('login-screen');
            statusTracker.innerText = "Waiting for login...";
        }
    });

    // --- ACCOUNT SETUP ---
    document.getElementById('btn-save-user').addEventListener('click', async () => {
        const username = document.getElementById('username-input').value.trim().toLowerCase();
        if (username.length > 2) {
            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    uid: currentUser.uid,
                    email: currentUser.email,
                    username: username,
                    searchKey: username,
                    isOnline: true
                });
                window.location.reload(); 
            } catch (error) { alert("Error saving user: " + error.message); }
        } else {
            alert("Username must be at least 3 characters.");
        }
    });

    // --- SEARCH & INBOX DYNAMICS ---
    const inboxSearchInput = document.getElementById('inbox-search');
    inboxSearchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        if (term.length > 0) { performSearch(term); } 
        else { loadInbox(); }
    });

    // SEARCH LOGIC: Looks for new people in 'users' collection
    function performSearch(term) {
        if(unsubInbox) unsubInbox(); 
        const list = document.getElementById('inbox-list');
        const q = query(collection(db, "users"), where("searchKey", ">=", term), where("searchKey", "<=", term + '\uf8ff'));
        
        unsubInbox = onSnapshot(q, (snapshot) => {
            list.innerHTML = '<div style="padding:10px 20px; font-weight:bold; font-size:14px; background:#fafafa;">Search Results</div>';
            let found = false;
            snapshot.forEach(doc => {
                const user = doc.data();
                if(user.uid !== currentUser.uid) {
                    found = true;
                    list.appendChild(createInboxElement(user.uid, user.username, "Tap to start chatting"));
                }
            });
            if (!found) list.innerHTML += '<div style="padding:20px;text-align:center;color:#8e8e8e;">No users found</div>';
        });
    }

    // INBOX LOGIC: Only pulls from 'chats' where you are a participant
    function loadInbox() {
        if(unsubInbox) unsubInbox();
        const list = document.getElementById('inbox-list');
        
        const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser.uid));
        
        unsubInbox = onSnapshot(q, (snapshot) => {
            list.innerHTML = '';
            let chatDocs = [];
            
            snapshot.forEach(doc => chatDocs.push(doc.data()));
            
            // Sort chats so newest messages are at the top
            chatDocs.sort((a, b) => {
                const timeA = a.lastUpdated ? a.lastUpdated.toMillis() : 0;
                const timeB = b.lastUpdated ? b.lastUpdated.toMillis() : 0;
                return timeB - timeA;
            });

            if (chatDocs.length === 0) {
                list.innerHTML = '<div style="padding:40px 20px; text-align:center; color:#8e8e8e;">Your inbox is empty.<br>Search for a username above to start a chat!</div>';
                return;
            }

            chatDocs.forEach(chat => {
                const partnerId = chat.participants.find(id => id !== currentUser.uid);
                const partnerName = chat.participantNames[partnerId] || "User";
                const previewText = chat.lastMessage || "Started a chat";
                
                list.appendChild(createInboxElement(partnerId, partnerName, previewText));
            });
        });
    }

    function createInboxElement(partnerUid, partnerUsername, subtitle) {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
            <div class="avatar">👤</div>
            <div class="user-info">
                <span class="user-name">${partnerUsername}</span>
                <span class="user-preview">${subtitle}</span>
            </div>
        `;
        div.onclick = () => openChat({ uid: partnerUid, username: partnerUsername });
        return div;
    }

    // --- INDIVIDUAL CHAT LOGIC ---
    function openChat(partner) {
        currentChatPartnerId = partner.uid;
        document.getElementById('chat-partner-name').innerText = partner.username;
        document.getElementById('chat-online-dot').style.display = 'none'; 
        navigateTo('chat-screen');

        const uids = [currentUser.uid, partner.uid].sort();
        currentChatId = `${uids[0]}_${uids[1]}`;
        const thread = document.getElementById('message-thread');
        
        // Listen for Live Online Status (Green Dot)
        if(unsubPartner) unsubPartner();
        unsubPartner = onSnapshot(doc(db, "users", partner.uid), (docSnap) => {
            if(docSnap.exists() && docSnap.data().isOnline) {
                document.getElementById('chat-online-dot').style.display = 'block';
            } else {
                document.getElementById('chat-online-dot').style.display = 'none';
            }
        });

        // Listen for Messages
        const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("timestamp", "asc"));
        unsubMessages = onSnapshot(q, (snapshot) => {
            thread.innerHTML = '';
            let lastMessageIsMine = false;
            let lastMessageSeen = false;

            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                const isMine = msg.senderId === currentUser.uid;
                
                const div = document.createElement('div');
                div.className = `msg-bubble ${isMine ? 'sent' : 'received'}`;
                div.innerText = msg.text;
                thread.appendChild(div);

                if(!isMine && !msg.isSeen) { updateDoc(docSnap.ref, { isSeen: true }); }
                
                lastMessageIsMine = isMine;
                lastMessageSeen = msg.isSeen;
            });

            if (lastMessageIsMine && lastMessageSeen) {
                const seenDiv = document.createElement('div');
                seenDiv.className = 'status-indicator';
                seenDiv.innerText = 'Seen';
                thread.appendChild(seenDiv);
            }
            thread.scrollTop = thread.scrollHeight; 
        });

        // Listen for Typing 
        unsubTyping = onSnapshot(doc(db, "chats", currentChatId), (docSnap) => {
            const ind = document.getElementById('typing-indicator');
            if(docSnap.exists() && docSnap.data().typing === currentChatPartnerId) {
                ind.style.display = 'block';
            } else { ind.style.display = 'none'; }
        });
    }

    // --- SEND MESSAGE & TYPING TRIGGER ---
    const msgInput = document.getElementById('message-input');
    let typingTimeout;

    msgInput.addEventListener('input', () => {
        if(!currentChatId) return;
        
        setDoc(doc(db, "chats", currentChatId), { 
            typing: currentUser.uid,
            participants: [currentUser.uid, currentChatPartnerId] 
        }, { merge: true });
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { 
            setDoc(doc(db, "chats", currentChatId), { typing: null },
